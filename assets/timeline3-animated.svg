
<svg viewBox="0 0 1200 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title" style="background:#0b1220">
  <title>PEOPLE SKILLS × DATA SKILLS — Career Timeline</title>

  <style>
    :root {
      --bg:#0b1220;
      --fg:#eaf2ff;
      --muted:#b8c2d8;
      --strong:#ffffff;

      --line1:#5eead4;
      --line2:#a78bfa;
      --line3:#f472b6;

      --badge1:#22d3ee;
      --badge2:#a78bfa;
      --badge3:#f472b6;
      --badge4:#f59e0b;
      --badge5:#34d399;
    }

    svg {
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial;
    }

    .title {
      fill:#ffd166;
      font-weight:800;
      letter-spacing:.6px;
    }

    .year {
      fill:var(--strong);
      font-size:12px;
      font-weight:700;
    }

    .label {
      fill:var(--muted);
      font-size:12px;
    }

    .axis {
      stroke:url(#axisGrad);
      stroke-width:6;
      stroke-linecap:round;
    }

    .badge {
      filter: drop-shadow(0 4px 14px rgba(0,0,0,.35));
    }
  </style>

  <defs>
    <linearGradient id="axisGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="var(--line1)"/>
      <stop offset="50%" stop-color="var(--line2)"/>
      <stop offset="100%" stop-color="var(--line3)"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="50%" y="42" text-anchor="middle" class="title" font-size="22">
    PEOPLE SKILLS × DATA SKILLS
  </text>

  <!-- Timeline Axis -->
  <line x1="120" y1="200" x2="1080" y2="200" class="axis"/>

  <!-- Node 1 -->
  <g transform="translate(200,200)">
    <circle cx="0" cy="-64" r="24" fill="var(--badge1)"/>
    <line x1="0" y1="0" x2="0" y2="-34" stroke="#6b7280" stroke-width="3"/>

    <g class="badge" transform="translate(-20,-96)">
      <rect width="40" height="40" rx="12" fill="var(--badge1)"/>
      <text x="20" y="25" text-anchor="middle" font-size="18">🎓</text>
    </g>

    <text class="year" text-anchor="middle" y="-8">2019</text>
    <text class="label" text-anchor="middle" y="26">
      Teacher — Kuwait
    </text>
  </g>

  <!-- Node 2 -->
  <g transform="translate(430,200)">
    <circle cx="0" cy="64" r="24" fill="var(--badge2)"/>
    <line x1="0" y1="0" x2="0" y2="34" stroke="#6b7280" stroke-width="3"/>

    <g class="badge" transform="translate(-20,56)">
      <rect width="40" height="40" rx="12" fill="var(--badge2)"/>
      <text x="20" y="25" text-anchor="middle" font-size="18">🧪</text>
    </g>

    <text class="year" text-anchor="middle" y="-8">2021</text>
    <text class="label" text-anchor="middle" y="90">
      Forensic Scientific Analysis
    </text>
  </g>

  <!-- Node 3 -->
  <g transform="translate(660,200)">
    <circle cx="0" cy="-64" r="24" fill="var(--badge3)"/>
    <line x1="0" y1="0" x2="0" y2="-34" stroke="#6b7280" stroke-width="3"/>

    <g class="badge" transform="translate(-20,-96)">
      <rect width="40" height="40" rx="12" fill="var(--badge3)"/>
      <text x="20" y="25" text-anchor="middle" font-size="18">🍽️</text>
    </g>

    <text class="year" text-anchor="middle" y="-8">2022</text>
    <text class="label" text-anchor="middle" y="26">
      Hospitality — United Kingdom
    </text>
  </g>

  <!-- Node 4 -->
  <g transform="translate(890,200)">
    <circle cx="0" cy="64" r="24" fill="var(--badge4)"/>
    <line x1="0" y1="0" x2="0" y2="34" stroke="#6b7280" stroke-width="3"/>

    <g class="badge" transform="translate(-20,56)">
      <rect width="40" height="40" rx="12" fill="var(--badge4)"/>
      <text x="20" y="25" text-anchor="middle" font-size="18">🎓</text>
    </g>

    <text class="year" text-anchor="middle" y="-8">2025</text>
    <text class="label" text-anchor="middle" y="90">
      Le Wagon — Data Analytics
    </text>
  </g>

  <!-- Node 5 -->
  <g transform="translate(1080,200)">
    <circle cx="0" cy="-64" r="24" fill="var(--badge5)"/>
    <line x1="0" y1="0" x2="0" y2="-34" stroke="#6b7280" stroke-width="3"/>

    <g class="badge" transform="translate(-20,-96)">
      <rect width="40" height="40" rx="12" fill="var(--badge5)"/>
      <text x="20" y="25" text-anchor="middle" font-size="18">💼</text>
    </g>

    <text class="year" text-anchor="middle" y="-8">2026</text>
    <text class="label" text-anchor="middle" y="26">
      IT Analyst — BI, SAP, Automation
    </text>
  </g>

</svg> 
